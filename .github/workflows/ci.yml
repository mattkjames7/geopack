name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_ubuntu:
        description: "Run Ubuntu job"
        type: boolean
        default: true
      run_macos:
        description: "Run macOS job"
        type: boolean
        default: true
      run_windows:
        description: "Run Windows job"
        type: boolean
        default: true

jobs:
  build-and-test-ubuntu:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.run_ubuntu == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure
        run: cmake -S . -B build -G Ninja -DGEOPACK_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-and-test-macos:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.run_macos == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install GCC (gfortran)
        run: brew install gcc
      - name: Configure
        run: cmake -S . -B build -G Ninja -DGEOPACK_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-and-test-windows:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.run_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure
        run: cmake -S . -B build -G Ninja -DGEOPACK_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        shell: pwsh
        run: |
          $dllPaths = @(
            "$PWD/build/src",
            "$PWD/build/_deps/datetime-build/lib",
            "$PWD/build/_deps/libspline-build/lib"
          )
          $env:PATH = ($dllPaths -join ';') + ';' + $env:PATH
          ctest --test-dir build --output-on-failure
