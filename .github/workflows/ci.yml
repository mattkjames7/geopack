name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_ubuntu:
        description: "Run Ubuntu job"
        type: boolean
        default: true
      run_macos:
        description: "Run macOS job"
        type: boolean
        default: true
      run_windows:
        description: "Run Windows job"
        type: boolean
        default: true

jobs:
  build-and-test:
    if: >-
      ${{
        github.event_name == 'pull_request' ||
        (matrix.id == 'ubuntu' && github.event.inputs.run_ubuntu == 'true') ||
        (matrix.id == 'macos' && github.event.inputs.run_macos == 'true') ||
        (matrix.id == 'windows' && github.event.inputs.run_windows == 'true')
      }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: ubuntu
            os: ubuntu-latest
          - id: macos
            os: macos-latest
          - id: windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure
        run: cmake -S . -B build -G Ninja -DGEOPACK_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
